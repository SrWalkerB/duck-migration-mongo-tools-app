# =====================================================
# Duck Migration - Release desktop (Windows, macOS, Linux)
# Dispara no push de tags (ex.: v0.1.0) e publica release no GitHub.
# Este workflow deve rodar com a raiz do repositório = duck-migration-mongo-tools-app.
# =====================================================

name: Release desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Instalar dependências do frontend
        run: npm ci

      - name: Instalar dependências do sidecar
        run: cd sidecar && npm install

      - name: Build e release Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Duck Migration ${{ github.ref_name }}'
          releaseBody: |
            Builds para Windows, macOS (Intel e Apple Silicon) e Linux.
            Veja os assets abaixo para baixar e instalar.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
